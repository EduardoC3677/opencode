# =============================================================================
#  SREP_CONFIG.cfg  -  Acer Aspire A315-59  (Insyde H2O - Alder Lake N)
# -----------------------------------------------------------------------------
#  Target firmware : BIOS 1.31  (HH5A4131.exe / abobios.bin)
#  SREP version    : 0.2.x  (SmokelessRuntimeEFIPatcher / Maxinator500 fork)
#  Source base     : Maxinator500/SREP-Patches  ->  NewConfigs/Acer/Acer_202x.cfg
#  Validation      : pattern offsets verified with capstone/regex on the
#                    extracted SetupUtility and A01ODMDxeDriver PE32 sections
#                    from this exact BIOS image (Acer A315-59, BIOS 1.31).
#
#  Verified matches in this firmware:
#     SetupUtility (1,402,112 bytes)
#       - "OC Perf Menu / Plat Volt"   -> 12 matches (first @ 0x000C8D5D)
#       - "OC Feature"                 ->  1 match   (@ 0x000D02B6)
#       - "XTU / FIVR section"         -> 13 matches (first @ 0x000C990A)
#       - AMD speed-check pattern      ->  0 matches (Intel platform -> Skip 3)
#
#     A01ODMDxeDriver (30,784 bytes)
#       - ODM Default       (740C..EB0C)        ->  1 match  (@ 0x000015B2)
#       - ODM Single 1      (4184C.74..)        ->  2 matches
#       - ODM Single 2      (..84C974..)        ->  1 match  (@ 0x00004048)
#       - ODM Single 5      (4584D274..)        ->  1 match  (@ 0x00003CCA)
#
#  After running SREP these unlock the hidden Insyde H2O "OC Perf Menu",
#  "Plat Volt Overrides", "OC Feature" and XTU/FIVR sub-menus and disable the
#  ODM-default suppression that Acer applies to every Setup page.
# =============================================================================

Op Loaded
SetupUtility

# -----------------------------------------------------------------
# Check if it's an AMD platform (skip 3 patches when found).
# On Acer A315-59 (Intel Alder Lake N) this pattern does NOT match,
# so the AMD-only patches are NOT skipped -- they simply find no
# target in the IFR and are no-ops. This block is kept for cross-
# compatibility with AMD-based Acer 202x machines.
# -----------------------------------------------------------------
Op Patch
Pattern
0F0F..00..00..000000FFFF000.020F0F..00..00..000000FFFF000.022902018601
0F
Op Skip
3

# "OC Perf Menu" and "Plat Volt Overrides" unlock pattern
Op Patch
Pattern
FFFF00......821206......000F0F
FFFF0001000A8247

# "OC Feature" item unlock pattern
Op Patch
Pattern
19821408....01000.000591
198247

# XTU / FIVR section unlock pattern
Op Patch
Pattern
2902290229020A821206....0.00
2902290229020A8247


Op Loaded
A01ODMDxeDriver

# ODM Default unlock pattern (74 0C -> EB 0C : turn JE into JMP)
Op FastPatch
Pattern
740C48B80300000000000080
EB0C48B80300000000000080

# ODM Combo unlock pattern start
# 1) Setup-Hide type
Op Patch
Pattern
74..4084CD
7400
Op FastPatch
Pattern
7427488D05
7400
Op Patch
Pattern
4885C078..80
4885C0EB06
Op Skip
9

# 2) TravelMate type (kept for cross-compat; not present on A315-59)
Op FastPatch
Pattern
85C0745E
85C0EB5E
Op FastPatch
Pattern
85C0744F
85C0EB4F
Op FastPatch
Pattern
85C0744D
85C07400
Op Skip
5

# ODM Single unlock pattern start
# 1) (matches twice on A315-59 @0x5882, @0x597E)
Op Patch
Pattern
4184C.74..
4184C27400

# 2) (matches once on A315-59 @0x4048)
Op Patch
Pattern
..84C974..
0484C97400

# 3) (not present on A315-59 - kept for cross-compat)
Op Patch
Pattern
A801740.
A8017400

# 4) (not present on A315-59 - kept for cross-compat)
Op Patch
Pattern
403ACD75..
403ACD7500

# 5) (matches once on A315-59 @0x3CCA)
Op Patch
Pattern
4584D274..
4584D27400

Op End


# -----------------------------------------------------------------
#  Finally re-execute the patched SetupUtility application so the
#  user lands in the unlocked BIOS menu.
# -----------------------------------------------------------------
Op LoadFromFV
SetupUtilityApp
Op Exec
