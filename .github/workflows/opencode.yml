name: opencode

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  issue_comment:
    types:
      - created

  pull_request_review_comment:
    types:
      - created

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  detect-trigger:
    runs-on: ubuntu-latest

    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      run_kind: ${{ steps.check.outputs.run_kind }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      model: ${{ steps.check.outputs.model }}
      provider: ${{ steps.check.outputs.provider }}

    steps:
      - id: check
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || '' }}

          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}

          HAS_PR:
            ${{ github.event.pull_request.number != null || github.event.issue.pull_request != null }}

        run: |
          set -euo pipefail

          resolve_model() {
            local input="${1:-deepseek-v4-pro}"

            case "$input" in
              deepseek-v4-pro)
                echo "deepseek/deepseek-v4-pro"
                ;;
              deepseek/*)
                echo "$input"
                ;;
              *)
                echo "deepseek/deepseek-v4-pro"
                ;;
            esac
          }

          extract_provider() {
            echo "${1%%/*}"
          }

          SHOULD_RUN="false"
          RUN_KIND="none"

          FULL_MODEL="$(resolve_model "deepseek-v4-pro")"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            SHOULD_RUN="true"
            RUN_KIND="auto_pr_review"

          elif [[ "$EVENT_NAME" == "issue_comment" || "$EVENT_NAME" == "pull_request_review_comment" ]]; then

            if echo "$COMMENT_BODY" | grep -qiE '(^|[[:space:]])/(oc|opencode)\b'; then

              SELECTED_MODEL="$(echo "$COMMENT_BODY" | grep -oiP 'model=\K\S+' | head -1 || true)"

              FULL_MODEL="$(resolve_model "${SELECTED_MODEL:-deepseek-v4-pro}")"

              if [[ "$HAS_PR" == "true" ]]; then
                SHOULD_RUN="true"
                RUN_KIND="manual_pr_review"
              else
                SHOULD_RUN="true"
                RUN_KIND="issue_task"
              fi
            fi
          fi

          {
            echo "should_run=$SHOULD_RUN"
            echo "run_kind=$RUN_KIND"
            echo "pr_number=$PR_NUMBER"
            echo "issue_number=$ISSUE_NUMBER"
            echo "model=$FULL_MODEL"
            echo "provider=$(extract_provider "$FULL_MODEL")"
          } >> "$GITHUB_OUTPUT"

  opencode:
    needs: detect-trigger

    if: needs.detect-trigger.outputs.should_run == 'true'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set Azure OpenAI env vars
        shell: bash
        run: |
          {
            echo "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_API_KEY }}"
            echo "AZURE_API_KEY=${{ secrets.AZURE_API_KEY }}"
          } >> "$GITHUB_ENV"

      - name: Compose OpenCode prompt
        id: compose
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}

          COMMENT_BODY: ${{ github.event.comment.body || '' }}

          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}

          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}

        run: |
          set -euo pipefail

          DELIM="OPENCODE_PROMPT_EOF_$(date +%s%N)"

          {
            echo "prompt<<$DELIM"

            echo "INSTRUCCIONES OBLIGATORIAS:"
            echo "- NO hagas preguntas."
            echo "- NO uses plan mode."
            echo "- Ejecuta directamente."
            echo "- Usa /tmp/opencode para archivos temporales."
            echo ""

            echo "CONTEXTO:"
            echo "event_name=${EVENT_NAME}"
            echo ""

            if [[ -n "$COMMENT_BODY" ]]; then
              echo "=== COMENTARIO ==="
              echo "$COMMENT_BODY"
              echo ""
            fi

            if [[ -n "$ISSUE_TITLE" || -n "$ISSUE_BODY" ]]; then
              echo "=== ISSUE ==="
              echo "title: $ISSUE_TITLE"
              echo "body:"
              echo "$ISSUE_BODY"
              echo ""
            fi

            if [[ -n "$PR_TITLE" || -n "$PR_BODY" ]]; then
              echo "=== PULL REQUEST ==="
              echo "title: $PR_TITLE"
              echo "body:"
              echo "$PR_BODY"
              echo ""
            fi

            echo "$DELIM"

          } >> "$GITHUB_OUTPUT"

      - name: Install OCX
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL https://ocx.kdco.dev/install.sh | sh

          mkdir -p ~/.config

          ocx init --global

          ocx profile add ws \
            --source tweak/p-2qtlsfhr \
            --from https://tweakoc.com/r \
            --global

      - name: Export OCX profile
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifact

          cp -r /home/runner/.config artifact/

      - name: Upload OCX profile artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocx-profile
          include-hidden-files: 'true'
          path: artifact

      - name: Cleanup temporary files
        shell: bash
        run: rm -rf artifact

      - name: Run OpenCode Review
        uses: sst/opencode/github@latest

        env:
          VERSION: "1.15.0"
          AZURE_OPENAI_API_KEY: ${{ env.AZURE_OPENAI_API_KEY }}

        with:
          model: ${{ needs.detect-trigger.outputs.model }}
          prompt: ${{ steps.compose.outputs.prompt }}

      - name: Report failure
        if: failure()

        uses: actions/github-script@v7

        env:
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          script: |
            const issueNumber =
              process.env.RUN_KIND === 'issue_task'
                ? Number(process.env.ISSUE_NUMBER)
                : Number(process.env.PR_NUMBER);

            const body =
              process.env.RUN_KIND === 'issue_task'
                ? `🤖 Task failed.\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                : `🤖 Review failed.\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
