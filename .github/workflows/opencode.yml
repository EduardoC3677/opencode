name: opencode

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      run_kind: ${{ steps.check.outputs.run_kind }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      model: ${{ steps.check.outputs.model }}
      provider: ${{ steps.check.outputs.provider }}
    steps:
      - id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PR: ${{ github.event.issue.pull_request != '' || github.event.pull_request != '' }}
        run: |
          resolve_model() {
            local input="$1"
            case "$input" in
              */*) echo "$input" ;;
              Codestral-2501|DeepSeek-V4-Flash|DeepSeek-V3.2-Speciale|Kimi-K2.6|DeepSeek-R1|DeepSeek-V3.2) echo "azure-openai/$input" ;;
              claude-opus-4-7|claude-opus-4-6) echo "azure-anthropic/$input" ;;
              gpt-5.4-pro) echo "azure-cognitive/$input" ;;
              gpt-5.3-codex) echo "azure-echoais/$input" ;;
              *) echo "" ;;
            esac
          }
          extract_provider() {
            echo "${1%%/*}"
          }
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            FULL_MODEL=$(resolve_model "claude-opus-4-7")
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_kind=auto_pr_review" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "model=$FULL_MODEL" >> "$GITHUB_OUTPUT"
            echo "provider=$(extract_provider "$FULL_MODEL")" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "issue_comment" ] || [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            if echo "$COMMENT_BODY" | grep -qE '(^|[[:space:]])/(oc|opencode)\b'; then
              SELECTED_MODEL=$(echo "$COMMENT_BODY" | grep -oP 'model=\K\S+' | head -1 || true)
              FULL_MODEL=$(resolve_model "${SELECTED_MODEL:-claude-opus-4-7}")
              if [ "$IS_PR" = "true" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=manual_pr_review" >> "$GITHUB_OUTPUT"
                echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
                echo "model=$FULL_MODEL" >> "$GITHUB_OUTPUT"
                echo "provider=$(extract_provider "$FULL_MODEL")" >> "$GITHUB_OUTPUT"
              else
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=issue_task" >> "$GITHUB_OUTPUT"
                echo "pr_number=" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
                echo "model=$FULL_MODEL" >> "$GITHUB_OUTPUT"
                echo "provider=$(extract_provider "$FULL_MODEL")" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "run_kind=none" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "run_kind=none" >> "$GITHUB_OUTPUT"
          fi

  opencode:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: 'false'
          
      - name: Bot Details
        id: bot-details
        uses: raven-actions/bot-details@v1

      - name: Set Azure env vars for model provider
        run: |
          PROVIDER="${{ needs.detect-trigger.outputs.provider }}"
          case "$PROVIDER" in
            azure-anthropic)
              echo "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" >> $GITHUB_ENV
              echo "OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_OPENAI_RESOURCE_NAME=${{ secrets.AZURE_OPENAI_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
            azure-openai)
              echo "AZURE_ANTHROPIC_API_KEY=${{ secrets.AZURE_ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
              echo "ANTHROPIC_API_KEY=${{ secrets.AZURE_ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_ANTHROPIC_RESOURCE_NAME=${{ secrets.AZURE_ANTHROPIC_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
            azure-cognitive)
              echo "AZURE_COGNITIVE_API_KEY=${{ secrets.AZURE_COGNITIVE_API_KEY }}" >> $GITHUB_ENV
              echo "OPENAI_API_KEY=${{ secrets.AZURE_COGNITIVE_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_COGNITIVE_RESOURCE_NAME=${{ secrets.AZURE_COGNITIVE_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
            azure-echoais)
              echo "AZURE_ECHOAIS_API_KEY=${{ secrets.AZURE_ECHOAIS_API_KEY }}" >> $GITHUB_ENV
              echo "OPENAI_API_KEY=${{ secrets.AZURE_ECHOAIS_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_ECHOAIS_RESOURCE_NAME=${{ secrets.AZURE_ECHOAIS_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
          esac

      - name: Run OpenCode Review
        uses: sst/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ env.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ env.AZURE_OPENAI_API_KEY }}
        with:
          model: ${{ needs.detect-trigger.outputs.model }}
          

      - name: Report failure
        if: failure()
        env:
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = process.env.RUN_KIND === 'issue_task'
              ? Number(process.env.ISSUE_NUMBER)
              : Number(process.env.PR_NUMBER)
            const body = process.env.RUN_KIND === 'issue_task'
              ? `🤖 Task failed. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              : `🤖 Review failed. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            })
