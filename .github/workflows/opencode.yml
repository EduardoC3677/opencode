name: opencode

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      run_kind: ${{ steps.check.outputs.run_kind }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      issue_number: ${{ steps.check.outputs.issue_number }}
      model: ${{ steps.check.outputs.model }}
      provider: ${{ steps.check.outputs.provider }}
    steps:
      - id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PR: ${{ github.event.issue.pull_request != '' || github.event.pull_request != '' }}
        run: |
          set -euo pipefail

          resolve_model() {
            local input="\$1"
            case "$input" in
              deepseek-v4-pro) echo "azure-openai/$input" ;;
              *) echo "azure-openai/deepseek-v4-pro" ;;
            esac
          }

          extract_provider() { echo "${1%%/*}"; }

          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            FULL_MODEL=$(resolve_model "deepseek-v4-pro")
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_kind=auto_pr_review" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "model=$FULL_MODEL" >> "$GITHUB_OUTPUT"
            echo "provider=$(extract_provider "$FULL_MODEL")" >> "$GITHUB_OUTPUT"

          elif [ "$EVENT_NAME" = "issue_comment" ] || [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            if echo "$COMMENT_BODY" | grep -qE '(^|[[:space:]])/(oc|opencode)\b'; then
              SELECTED_MODEL=$(echo "$COMMENT_BODY" | grep -oP 'model=\K\S+' | head -1 || true)
              FULL_MODEL=$(resolve_model "${SELECTED_MODEL:-deepseek-v4-pro}")

              if [ "$IS_PR" = "true" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=manual_pr_review" >> "$GITHUB_OUTPUT"
                echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
                echo "model=$FULL_MODEL" >> "$GITHUB_OUTPUT"
                echo "provider=$(extract_provider "$FULL_MODEL")" >> "$GITHUB_OUTPUT"
              else
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=issue_task" >> "$GITHUB_OUTPUT"
                echo "pr_number=" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
                echo "model=$FULL_MODEL" >> "$GITHUB_OUTPUT"
                echo "provider=$(extract_provider "$FULL_MODEL")" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "run_kind=none" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "run_kind=none" >> "$GITHUB_OUTPUT"
          fi

  opencode:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: 'false'

      - name: Bot Details
        id: bot-details
        uses: raven-actions/bot-details@v1

      - name: Set Azure OpenAI env vars
        run: |
          echo "AZURE_API_KEY=${{ secrets.AZURE_API_KEY }}" >> "$GITHUB_ENV"
          echo "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_API_KEY }}" >> "$GITHUB_ENV"

      - name: Compose OpenCode prompt (include PR/issue/comment)
        id: compose
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          DELIM="OPENCODE_PROMPT_EOF_$(date +%s%N)"

          {
            echo "prompt<<$DELIM"
            echo "INSTRUCCIONES OBLIGATORIAS (NO ROMPER):"
            echo "- NO hagas preguntas al usuario ni pidas confirmación (ni como texto)."
            echo "- NO ofrezcas opciones (a/b/c/d). Decide y continúa."
            echo "- NO escribas 'Before I start', 'Please confirm' ni bloques de confirmación."
            echo "- NO uses plan mode. Ejecuta directamente."
            echo "- Trabaja en /tmp/opencode para scratch cuando necesites temporales."
            echo "- Escribe resultados en archivos del repo (RUN_LOG.md, docs/*, etc.)."
            echo ""
            echo "CONTEXTO DEL EVENTO:"
            echo "event_name=${EVENT_NAME}"
            echo ""
            if [ -n "${COMMENT_BODY:-}" ]; then
              echo "=== COMENTARIO (incluye comando /oc o /opencode) ==="
              echo "${COMMENT_BODY}"
              echo ""
            fi
            if [ -n "${ISSUE_TITLE:-}" ] || [ -n "${ISSUE_BODY:-}" ]; then
              echo "=== ISSUE ==="
              echo "title: ${ISSUE_TITLE}"
              echo "body:"
              echo "${ISSUE_BODY}"
              echo ""
            fi
            if [ -n "${PR_TITLE:-}" ] || [ -n "${PR_BODY:-}" ]; then
              echo "=== PULL REQUEST ==="
              echo "title: ${PR_TITLE}"
              echo "body:"
              echo "${PR_BODY}"
              echo ""
            fi
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Run OpenCode Review
        uses: sst/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_API_KEY: ${{ env.AZURE_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ env.AZURE_API_KEY }}
        with:
          model: ${{ needs.detect-trigger.outputs.model }}
          agent: build
          share: false
          prompt: ${{ steps.compose.outputs.prompt }}

      - name: Report failure
        if: failure()
        env:
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = process.env.RUN_KIND === 'issue_task'
              ? Number(process.env.ISSUE_NUMBER)
              : Number(process.env.PR_NUMBER)
            const body = process.env.RUN_KIND === 'issue_task'
              ? `🤖 Task failed. ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              : `🤖 Review failed. ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            })
