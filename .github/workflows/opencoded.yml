name: opencoded

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencoded-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  detect-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      run_kind: ${{ steps.check.outputs.run_kind }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      issue_number: ${{ steps.check.outputs.issue_number }}
    steps:
      - id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
          IS_PR: ${{ github.event.issue.pull_request != '' || github.event.pull_request != '' }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          ISSUE_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"

          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "run_kind=auto_pr_review" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "issue_comment" ] || [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            if echo "$COMMENT_BODY" | grep -qE '(^|[[:space:]])/(ocd|opencoded)\b'; then
              if [ "$IS_PR" = "true" ]; then
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=manual_pr_review" >> "$GITHUB_OUTPUT"
                echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
              else
                echo "should_run=true" >> "$GITHUB_OUTPUT"
                echo "run_kind=issue_task" >> "$GITHUB_OUTPUT"
                echo "pr_number=" >> "$GITHUB_OUTPUT"
                echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "run_kind=none" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "run_kind=none" >> "$GITHUB_OUTPUT"
          fi

  opencoded:
    needs: detect-trigger
    if: needs.detect-trigger.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Bot Details
        id: bot-details
        uses: raven-actions/bot-details@v1

      - name: Setup credentials
        run: |
          git config --global user.name "${{ steps.bot-details.outputs.name }}"
          git config --global user.email "${{ steps.bot-details.outputs.email }}"
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf https://github.com/

      - name: Run OpenCode Review
        uses: anomalyco/opencode/github@latest
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_FOUNDRY_API_KEY || secrets.AZURE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: ${{ needs.detect-trigger.outputs.run_kind == 'manual_pr_review' && 'azure-openai/DeepSeek-V4-Flash' || needs.detect-trigger.outputs.run_kind == 'issue_task' && 'azure-openai/DeepSeek-V4-Flash' || 'azure-openai/DeepSeek-V4-Flash' }}
          agent: ${{ needs.detect-trigger.outputs.run_kind == 'issue_task' && 'build' || needs.detect-trigger.outputs.run_kind == 'manual_pr_review' && 'manual-review' || 'auto-review' }}
          use_github_token: true

      - name: Report failure
        if: failure()
        env:
          PR_NUMBER: ${{ needs.detect-trigger.outputs.pr_number }}
          ISSUE_NUMBER: ${{ needs.detect-trigger.outputs.issue_number }}
          RUN_KIND: ${{ needs.detect-trigger.outputs.run_kind }}
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = process.env.RUN_KIND === 'issue_task'
              ? Number(process.env.ISSUE_NUMBER)
              : Number(process.env.PR_NUMBER)
            const body = process.env.RUN_KIND === 'issue_task'
              ? `🤖 Task failed. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              : `🤖 Review failed. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            })