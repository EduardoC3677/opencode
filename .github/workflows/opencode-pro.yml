name: TypeScript Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Type Check
      run: npm run type-check

    - name: Build TypeScript
      run: npm run build

    - name: Run Tests
      run: npm test

    - name: Fail Fast on Error
      if: failure()
      run: echo 'Build failed - see logs above'
