name: opencode-pro CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'opencode-pro/**'
  pull_request:
    branches: [main]
    paths:
      - 'opencode-pro/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opencode-pro

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: opencode-pro/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint || echo "Lint issues found (non-blocking)"

      - name: Test
        run: npm test || echo "No tests configured yet"

      - name: Package (dry-run)
        run: npm pack --dry-run

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-pro-dist
          path: opencode-pro/dist/
          if-no-files-found: error

  publish-check:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Publish ready
        run: echo "✅ Package is ready for npm publish"

      # Uncomment to actually publish:
      # - uses: actions/checkout@v4
