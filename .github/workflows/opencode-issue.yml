name: Issue Triage

on:
  issues:
    types: [opened]

concurrency:
  group: opencode-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check-account:
    runs-on: ubuntu-latest
    outputs:
      is_trusted: ${{ steps.check.outputs.result }}
    permissions:
      issues: read
    steps:
      - name: Check account age
        id: check
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const user = await github.rest.users.getByUsername({
              username: context.payload.issue.user.login
            });
            const created = new Date(user.data.created_at);
            const days = (Date.now() - created) / (1000 * 60 * 60 * 24);
            return days >= 30;
          result-encoding: string

  triage:
    needs: check-account
    if: needs.check-account.outputs.is_trusted == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: 'false'

      - name: Set Azure env vars for model provider
        run: |
          PROVIDER="${{ steps.detect.outputs.provider }}"
          case "$PROVIDER" in
            azure-openai)
              echo "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" >> $GITHUB_ENV
              echo "OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_OPENAI_RESOURCE_NAME=${{ secrets.AZURE_OPENAI_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
            azure-anthropic)
              echo "AZURE_ANTHROPIC_API_KEY=${{ secrets.AZURE_ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
              echo "ANTHROPIC_API_KEY=${{ secrets.AZURE_ANTHROPIC_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_ANTHROPIC_RESOURCE_NAME=${{ secrets.AZURE_ANTHROPIC_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
            azure-cognitive)
              echo "AZURE_COGNITIVE_API_KEY=${{ secrets.AZURE_COGNITIVE_API_KEY }}" >> $GITHUB_ENV
              echo "OPENAI_API_KEY=${{ secrets.AZURE_COGNITIVE_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_COGNITIVE_RESOURCE_NAME=${{ secrets.AZURE_COGNITIVE_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
            azure-echoais)
              echo "AZURE_ECHOAIS_API_KEY=${{ secrets.AZURE_ECHOAIS_API_KEY }}" >> $GITHUB_ENV
              echo "OPENAI_API_KEY=${{ secrets.AZURE_ECHOAIS_API_KEY }}" >> $GITHUB_ENV
              echo "AZURE_ECHOAIS_RESOURCE_NAME=${{ secrets.AZURE_ECHOAIS_RESOURCE_NAME }}" >> $GITHUB_ENV
              ;;
          esac

      - name: Run OpenCode Issue Triage
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-20250514
          use_github_token: true
          prompt: |
            Review this issue. If there's a clear fix or relevant docs:
            - Provide documentation links
            - Add error handling guidance for code examples
            Otherwise, do not comment.

      - name: Report failure
        if: failure()
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = `🤖 Issue triage failed. [View logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })