name: Descargar TBI -> TBIMount -> extraer -> LFS/shards -> multi-repo (ubuntu-latest)

on:
  workflow_dispatch:
    inputs:
      tbi_url:
        description: "URL del .tbi"
        required: true
        default: "https://archive.org/download/acer-aspire-xc-830-full-image/Acer%20Aspire%20XC-830%20Full%20Image.tbi"
      repo_prefix:
        description: "Prefijo repos destino: <prefix>-partXX"
        required: true
        default: "acer-xc830-image"
      max_repo_gb:
        description: "Tamaño máximo por repo (GB) para sharding"
        required: true
        default: "4"
      visibility:
        description: "public o private"
        required: true
        default: "private"
      lfs_threshold_mb:
        description: "Umbral LFS (MB): track archivos > este valor"
        required: true
        default: "50"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TBI_URL: ${{ inputs.tbi_url }}
      REPO_PREFIX: ${{ inputs.repo_prefix }}
      MAX_REPO_GB: ${{ inputs.max_repo_gb }}
      VISIBILITY: ${{ inputs.visibility }}
      LFS_THRESHOLD_MB: ${{ inputs.lfs_threshold_mb }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Espacio ANTES
        run: df -h

      # Limpia espacio del runner (puede liberar bastante, según opciones). 
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Espacio DESPUÉS
        run: df -h

      - name: Dependencias
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y aria2 curl unzip rsync git-lfs jq util-linux ntfs-3g python3
          # gh suele estar disponible; si no, lo instalamos:
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get install -y gh
          fi

      - name: Configurar Git
        shell: bash
        run: |
          set -euxo pipefail
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

      - name: Descargar .tbi
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p work
          cd work
          aria2c -x 16 -s 16 --continue=true --retry-wait=10 --max-tries=20 \
            -o image.tbi "$TBI_URL"
          ls -lh image.tbi

      - name: Descargar + extraer TBIMount Linux (ZIP real) + seleccionar .ko compatible
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p tools/tbimount
          cd tools/tbimount

          URL="https://www.terabyteunlimited.com/downloads/tbimount_linux.zip"

          # Descarga como "navegador" para evitar HTML en lugar del ZIP (tu log mostró ~5KB).
          curl -fL --retry 10 --retry-delay 5 \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/123 Safari/537.36" \
            -H "Accept: application/zip,application/octet-stream;q=0.9,*/*;q=0.8" \
            -o tbimount_linux.zip "$URL"

          echo "Descarga:"
          ls -lh tbimount_linux.zip
          file tbimount_linux.zip || true

          # Validar zip
          if ! unzip -t tbimount_linux.zip >/dev/null 2>&1; then
            echo "::error::El archivo descargado NO es un ZIP válido (probablemente HTML/redirect/bloqueo)."
            echo "Primeros bytes para diagnóstico:"
            head -c 400 tbimount_linux.zip | sed -e 's/</\n</g' | head -n 40 || true
            exit 1
          fi

          rm -rf extracted
          unzip -q tbimount_linux.zip -d extracted
          cd extracted

          echo "Kernel actual:"
          uname -a
          KREL="$(uname -r)"

          echo "Buscando binario tbimount..."
          TBIMOUNT_BIN="$(find . -type f -iname 'tbimount' | head -n 1 || true)"
          if [[ -z "$TBIMOUNT_BIN" ]]; then
            echo "::error::No encontré el binario 'tbimount' dentro del ZIP."
            exit 1
          fi
          chmod +x "$TBIMOUNT_BIN" || true

          echo "Buscando módulos tbimount.ko..."
          mapfile -t KOS < <(find . -type f -name 'tbimount.ko' -print || true)
          if [[ "${#KOS[@]}" -eq 0 ]]; then
            echo "::error::No encontré tbimount.ko dentro del ZIP."
            exit 1
          fi

          echo "Seleccionando .ko compatible por vermagic con: $KREL"
          BEST_KO=""
          for ko in "${KOS[@]}"; do
            if modinfo "$ko" >/dev/null 2>&1; then
              VM="$(modinfo -F vermagic "$ko" || true)"
              echo " - $ko -> vermagic: ${VM:-N/A}"
              if [[ "${VM:-}" == *"$KREL"* ]]; then
                BEST_KO="$ko"
                break
              fi
            else
              echo " - $ko -> modinfo no pudo leerlo"
            fi
          done

          if [[ -z "$BEST_KO" ]]; then
            echo "::error::No hay tbimount.ko compatible con este kernel ($KREL)."
            echo "Esto es común porque los módulos van amarrados a versiones específicas del kernel."
            echo "KO disponibles:"
            printf '%s\n' "${KOS[@]}"
            exit 1
          fi

          echo "Usando módulo: $BEST_KO"
          echo "TBIMOUNT_DIR=$PWD" >> "$GITHUB_ENV"
          echo "TBIMOUNT_BIN=$PWD/$TBIMOUNT_BIN" >> "$GITHUB_ENV"
          echo "TBIMOUNT_KO=$PWD/$BEST_KO" >> "$GITHUB_ENV"

          echo "Ayuda tbimount (si aplica):"
          "$PWD/$TBIMOUNT_BIN" || true

      - name: Cargar módulo (insmod) + montar TBI + copiar a work/extracted
        shell: bash
        env:
          TBIMOUNT_DIR: ${{ env.TBIMOUNT_DIR }}
          TBIMOUNT_BIN: ${{ env.TBIMOUNT_BIN }}
          TBIMOUNT_KO: ${{ env.TBIMOUNT_KO }}
        run: |
          set -euxo pipefail

          echo "Cargando módulo: $TBIMOUNT_KO"
          sudo insmod "$TBIMOUNT_KO" || {
            echo "::error::insmod falló (incompatibilidad kernel)."
            dmesg | tail -n 120 || true
            exit 1
          }

          lsmod | grep -i tbimount || true

          mkdir -p work/mnt work/extracted

          # Según README: ./tbimount mount filename.tbi y unmount. 
          pushd "$TBIMOUNT_DIR" >/dev/null
            sudo "$TBIMOUNT_BIN" mount "$GITHUB_WORKSPACE/work/image.tbi"
          popd >/dev/null

          # Debe crear /dev/tbia, /dev/tbib... 
          if [[ ! -e /dev/tbia ]]; then
            echo "No apareció /dev/tbia. Intentando crear nodos con major desde /proc/devices..."
            MAJOR="$(awk '/tbimount/{print $1}' /proc/devices | head -n1 || true)"
            if [[ -z "$MAJOR" ]]; then
              echo "::error::No se encontró major para tbimount y no existe /dev/tbia."
              dmesg | tail -n 120 || true
              exit 1
            fi
            for i in $(seq 0 9); do
              letter=$(printf "\\$(printf '%03o' $((97+i)))")  # a,b,c...
              dev="/dev/tbi${letter}"
              sudo mknod "$dev" b "$MAJOR" "$i" || true
              sudo chmod 666 "$dev" || true
            done
          fi

          # Montar en solo lectura como indica el README. 
          sudo mount -o ro /dev/tbia work/mnt

          # Copiar contenido al directorio extraído
          rsync -aH --numeric-ids work/mnt/ work/extracted/

          # Limpieza: desmontar, tbimount unmount, rmmod
          sudo umount work/mnt || true
          pushd "$TBIMOUNT_DIR" >/dev/null
            sudo "$TBIMOUNT_BIN" unmount || true
          popd >/dev/null
          sudo rmmod tbimount || true

          echo "Extracción completada:"
          du -sh work/extracted || true

      # GitHub bloquea >100MiB sin LFS; y LFS en Free/Pro limita a 2GB por archivo.
      # Por eso: partimos >1.9GB antes de shard/LFS. 
      - name: Partir archivos >1.9GB (para no rebasar límite LFS típico 2GB)
        shell: bash
        run: |
          set -euxo pipefail
          cd work/extracted
          while IFS= read -r -d '' f; do
            echo "Splitting: $f"
            dir="$(dirname "$f")"
            base="$(basename "$f")"
            split -b 1900M -d -a 3 --additional-suffix=.bin "$f" "$dir/$base.part-"
            rm -f "$f"
          done < <(find . -type f -size +1900M -print0)

      - name: Sharding por tamaño (bin-pack) -> work/shards/partXX
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/binpack.py \
            --src work/extracted \
            --dst work/shards \
            --max-gb "$MAX_REPO_GB"

      - name: Subir shards a repos separados (crear si no existen) + LFS (>umbral)
        shell: bash
        run: |
          set -euxo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Falta secrets.GH_TOKEN"
            exit 1
          fi
          export GH_TOKEN

          OWNER="$(jq -r .repository_owner.login < "$GITHUB_EVENT_PATH")"
          echo "OWNER=$OWNER"

          git lfs install --system

          i=1
          for part in work/shards/part*/; do
            part="${part%/}"
            repo="$(printf "%s-part%02d" "$REPO_PREFIX" "$i")"
            full="$OWNER/$repo"

            echo "=== Subiendo $part -> $full ==="

            if ! gh repo view "$full" >/dev/null 2>&1; then
              echo "Creando repo $full..."
              if [[ "$VISIBILITY" == "public" ]]; then
                gh repo create "$full" --public --confirm
              else
                gh repo create "$full" --private --confirm
              fi
            fi

            tmp="$(mktemp -d)"
            rsync -a --delete "$part"/ "$tmp"/

            pushd "$tmp" >/dev/null
              git init -b main
              git lfs install --local

              # Trackear con LFS los archivos > umbral (GitHub advierte >50MiB y bloquea >100MiB sin LFS). 
              threshold="${LFS_THRESHOLD_MB}M"
              while IFS= read -r -d '' big; do
                git lfs track "${big#./}"
              done < <(find . -type f -size +"$threshold" -print0)

              git add .gitattributes || true
              git add -A

              if ! git diff --cached --quiet; then
                git commit -m "Import $(basename "$part") (LFS > ${LFS_THRESHOLD_MB}MB)"
              else
                echo "Nada que commitear en $full"
              fi

              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${full}.git"
              git push -u origin main
            popd >/dev/null

            rm -rf "$tmp"
            i=$((i+1))
          done

      - name: Resumen
        shell: bash
        run: |
          set -euxo pipefail
          echo "Shards:"
          du -sh work/shards/part* || true
          echo "Listo."
          
