name: "Descargar TBI -> TBIMount -> extraer -> LFS/shards -> multi-repo (ubuntu-latest)"

on:
  workflow_dispatch:
    inputs:
      tbi_url:
        description: "URL del .tbi"
        required: true
        default: "https://archive.org/download/acer-aspire-xc-830-full-image/Acer%20Aspire%20XC-830%20Full%20Image.tbi"
      repo_prefix:
        description: "Prefijo repos destino: <prefix>-partXX"
        required: true
        default: "acer-xc830-image"
      max_repo_gb:
        description: "Tamaño máximo por repo (GB) para sharding"
        required: true
        default: "4"
      visibility:
        description: "public o private"
        required: true
        default: "private"
      lfs_threshold_mb:
        description: "Umbral LFS (MB): track archivos > este valor"
        required: true
        default: "50"
      force_insmod:
        description: "Intentar cargar .ko con insmod -f si no hay match exacto (riesgoso)"
        required: true
        default: "true"

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TBI_URL: ${{ inputs.tbi_url }}
      REPO_PREFIX: ${{ inputs.repo_prefix }}
      MAX_REPO_GB: ${{ inputs.max_repo_gb }}
      VISIBILITY: ${{ inputs.visibility }}
      LFS_THRESHOLD_MB: ${{ inputs.lfs_threshold_mb }}
      FORCE_INSMOD: ${{ inputs.force_insmod }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Espacio ANTES
        run: df -h

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Espacio DESPUÉS
        run: df -h

      - name: Dependencias
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            aria2 curl unzip rsync git-lfs jq util-linux ntfs-3g python3 \
            kmod multipath-tools

          if ! command -v gh >/dev/null 2>&1; then
            sudo apt-get install -y gh
          fi

      - name: Configurar Git
        shell: bash
        run: |
          set -euxo pipefail
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

      - name: Verificar token GH_TOKEN (obligatorio para crear/push repos)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Falta secrets.GH_TOKEN (PAT con permisos para crear repos y push)."
            exit 1
          fi

      - name: Descargar .tbi
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p work
          cd work
          aria2c -x 16 -s 16 --continue=true --retry-wait=10 --max-tries=20 \
            -o image.tbi "$TBI_URL"
          ls -lh image.tbi

      - name: Descargar + preparar TBIMount + FORZAR .ko 6.17 (sin búsqueda/vermagic)
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p tools/tbimount
          cd tools/tbimount

          URL="https://github.com/EduardoC3677/opencode/releases/download/1/tbimount_linux.zip"

          curl -fL --retry 10 --retry-delay 5 \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/123 Safari/537.36" \
            -H "Accept: application/zip,application/octet-stream;q=0.9,*/*;q=0.8" \
            -o tbimount_linux.zip "$URL"

          echo "Descarga:"
          ls -lh tbimount_linux.zip
          file tbimount_linux.zip || true

          if ! unzip -t tbimount_linux.zip >/dev/null 2>&1; then
            echo "::error::Lo descargado NO es ZIP válido (probable HTML/redirect)."
            head -c 400 tbimount_linux.zip | sed -e 's/</\n</g' | head -n 50 || true
            exit 1
          fi

          rm -rf extracted
          unzip -q tbimount_linux.zip -d extracted
          cd extracted

          echo "Kernel actual:"
          uname -a

          TBIMOUNT_BIN="$(find . -type f -iname 'tbimount' | head -n 1 || true)"
          if [[ -z "$TBIMOUNT_BIN" ]]; then
            echo "::error::No encontré el binario 'tbimount' dentro del ZIP."
            exit 1
          fi
          chmod +x "$TBIMOUNT_BIN" || true

          # FORZAR: tomar el KO 6.17.* amd64-iflnet MÁS ALTO (sin modinfo/vermagic)
          mapfile -t CANDS < <(find . -type f -path './6.17.*-amd64-iflnet/tbimount.ko' -print | sort -V)

          if [[ "${#CANDS[@]}" -eq 0 ]]; then
            echo "::error::No hay tbimount.ko 6.17.* amd64-iflnet dentro del ZIP."
            echo "KO disponibles:"
            find . -type f -name 'tbimount.ko' -print
            exit 1
          fi

          BEST_KO="${CANDS[-1]}"
          echo "KO 6.17.x (máximo) forzado elegido: $BEST_KO"

          echo "TBIMOUNT_DIR=$PWD" >> "$GITHUB_ENV"
          echo "TBIMOUNT_BIN=$PWD/$TBIMOUNT_BIN" >> "$GITHUB_ENV"
          echo "TBIMOUNT_KO=$PWD/$BEST_KO" >> "$GITHUB_ENV"

          echo "Ayuda tbimount (sin args):"
          "$PWD/$TBIMOUNT_BIN" || true

      - name: FORZAR insmod -f + tbimount mount + EXTRAER POR PARTICIONES (ro)
        shell: bash
        env:
          TBIMOUNT_DIR: ${{ env.TBIMOUNT_DIR }}
          TBIMOUNT_BIN: ${{ env.TBIMOUNT_BIN }}
          TBIMOUNT_KO: ${{ env.TBIMOUNT_KO }}
        run: |
          set -euxo pipefail

          echo "Kernel: $(uname -r)"
          echo "KO forzado: $TBIMOUNT_KO"
          echo "FORCE_INSMOD input: $FORCE_INSMOD (aquí se fuerza SIEMPRE insmod -f)"

          if ! sudo -n true 2>/dev/null; then
            echo "::error::Este runner no permite sudo sin password. Usa runner self-hosted."
            exit 1
          fi

          echo "Forzando carga del módulo con insmod -f (timeout 10s)..."
          timeout 10s sudo insmod -f "$TBIMOUNT_KO" || {
            echo "::error::insmod -f falló o se colgó."
            dmesg | tail -n 200 || true
            exit 1
          }

          lsmod | grep -i tbimount || true

          mkdir -p work/mnt work/extracted

          echo "Ejecutando tbimount mount (timeout 90s)..."
          timeout 90s sudo "$TBIMOUNT_BIN" mount "$GITHUB_WORKSPACE/work/image.tbi" || {
            echo "::error::tbimount mount falló o se colgó."
            dmesg | tail -n 200 || true
            exit 1
          }

          # Detectar dispositivo raíz:
          DEV=""
          if ls -1 /dev/tbimount* >/dev/null 2>&1; then
            DEV="$(ls -1t /dev/tbimount* | head -n 1)"
          elif [[ -e /dev/tbia ]]; then
            DEV="/dev/tbia"
          fi

          if [[ -z "$DEV" ]]; then
            echo "::error::No se detectó dispositivo (/dev/tbimount* o /dev/tbia)."
            dmesg | tail -n 200 || true
            exit 1
          fi

          echo "Dispositivo detectado: $DEV"
          lsblk -f "$DEV" || true

          sudo udevadm settle || true
          sudo partprobe "$DEV" || true

          PARTS="$(lsblk -ln -o PATH,TYPE "$DEV" | awk '$2=="part"{print $1}')"

          if [[ -z "$PARTS" ]]; then
            echo "No aparecen particiones directas. Intentando kpartx…"
            sudo kpartx -av "$DEV" || true
            sudo udevadm settle || true
            PARTS="$(lsblk -ln -o PATH,TYPE "$DEV" | awk '$2=="part"{print $1}')"
          fi

          if [[ -z "$PARTS" ]]; then
            echo "No se detectaron particiones. Se intentará montar el dispositivo completo como 1 volumen."
            PARTS="$DEV"
          fi

          echo "Particiones/volúmenes a extraer:"
          echo "$PARTS"

          i=1
          for P in $PARTS; do
            MP="work/mnt/part$(printf '%02d' "$i")"
            OUT="work/extracted/part$(printf '%02d' "$i")"
            sudo mkdir -p "$MP" "$OUT"

            FSTYPE="$(sudo blkid -o value -s TYPE "$P" 2>/dev/null || true)"
            echo "-> Montando $P (fstype=${FSTYPE:-unknown}) en $MP"

            case "$FSTYPE" in
              ext2|ext3|ext4) sudo mount -o ro,noload "$P" "$MP" ;;
              xfs)            sudo mount -o ro,norecovery "$P" "$MP" ;;
              btrfs)          sudo mount -o ro "$P" "$MP" ;;
              ntfs|ntfs3)
                if sudo mount -t ntfs3 -o ro "$P" "$MP" 2>/dev/null; then :;
                else sudo mount -t ntfs-3g -o ro "$P" "$MP"; fi
                ;;
              vfat|fat|exfat) sudo mount -o ro "$P" "$MP" ;;
              *)              sudo mount -o ro "$P" "$MP" ;;
            esac

            echo "   Copiando a $OUT"
            rsync -aH --numeric-ids "$MP"/ "$OUT"/

            sudo umount "$MP" || true
            i=$((i+1))
          done

          sudo kpartx -dv "$DEV" >/dev/null 2>&1 || true

          sudo "$TBIMOUNT_BIN" unmount "$DEV" || sudo "$TBIMOUNT_BIN" unmount || true
          sudo rmmod tbimount || true

          echo "Extracción completada:"
          du -sh work/extracted || true
          find work/extracted -maxdepth 2 -type d -print

      - name: Partir archivos >1.9GB (evitar límite típico de ~2GB por archivo LFS)
        shell: bash
        run: |
          set -euxo pipefail
          cd work/extracted
          while IFS= read -r -d '' f; do
            echo "Splitting: $f"
            dir="$(dirname "$f")"
            base="$(basename "$f")"
            split -b 1900M -d -a 3 --additional-suffix=.bin "$f" "$dir/$base.part-"
            rm -f "$f"
          done < <(find . -type f -size +1900M -print0)

      - name: Sharding por tamaño (bin-pack) -> work/shards/partXX
        shell: bash
        run: |
          set -euxo pipefail
          test -f scripts/binpack.py || { echo "::error::Falta scripts/binpack.py"; exit 1; }
          python3 scripts/binpack.py \
            --src work/extracted \
            --dst work/shards \
            --max-gb "$MAX_REPO_GB"

      - name: Subir shards a repos separados (crear si no existen) + LFS (>umbral)
        shell: bash
        run: |
          set -euxo pipefail
          export GH_TOKEN

          OWNER="$(jq -r .repository_owner.login < "$GITHUB_EVENT_PATH")"
          echo "OWNER=$OWNER"

          git lfs install --system

          i=1
          for part in work/shards/part*/; do
            part="${part%/}"
            repo="$(printf "%s-part%02d" "$REPO_PREFIX" "$i")"
            full="$OWNER/$repo"

            echo "=== Subiendo $part -> $full ==="

            if ! gh repo view "$full" >/dev/null 2>&1; then
              echo "Creando repo $full..."
              if [[ "$VISIBILITY" == "public" ]]; then
                gh repo create "$full" --public --confirm
              else
                gh repo create "$full" --private --confirm
              fi
            fi

            tmp="$(mktemp -d)"
            rsync -a --delete "$part"/ "$tmp"/

            pushd "$tmp" >/dev/null
              git init -b main
              git lfs install --local

              threshold="${LFS_THRESHOLD_MB}M"
              while IFS= read -r -d '' big; do
                git lfs track "${big#./}"
              done < <(find . -type f -size +"$threshold" -print0)

              git add .gitattributes || true
              git add -A

              if ! git diff --cached --quiet; then
                git commit -m "Import $(basename "$part") (LFS > ${LFS_THRESHOLD_MB}MB)"
              else
                echo "Nada que commitear en $full"
              fi

              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${full}.git"
              git push -u origin main
            popd >/dev/null

            rm -rf "$tmp"
            i=$((i+1))
          done

      - name: Resumen
        shell: bash
        run: |
          set -euxo pipefail
          echo "Particiones extraídas:"
          du -sh work/extracted/part* || true
          echo "Shards:"
          du -sh work/shards/part* || true
          echo "Listo."
          
