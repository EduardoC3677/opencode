name: Importar TBI, extraer, LFS (>50MB), dividir y subir a múltiples repos

on:
  workflow_dispatch:
    inputs:
      tbi_url:
        description: "URL del .tbi"
        required: true
        default: "https://archive.org/download/acer-aspire-xc-830-full-image/Acer%20Aspire%20XC-830%20Full%20Image.tbi"
      repo_prefix:
        description: "Prefijo para repos destino (se crearán como <prefix>-partXX)"
        required: true
        default: "acer-xc830-image"
      max_repo_gb:
        description: "Tamaño máximo por repo (GB) para el sharding"
        required: true
        default: "4"
      visibility:
        description: "public o private"
        required: true
        default: "private"
      lfs_threshold_mb:
        description: "Umbral LFS (MB): se trackean archivos > este valor"
        required: true
        default: "50"

permissions:
  contents: write

jobs:
  import_and_shard:
    # MUY recomendado: self-hosted por tamaño (22GB + extracción)
    runs-on: self-hosted

    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
      TBI_URL: ${{ inputs.tbi_url }}
      REPO_PREFIX: ${{ inputs.repo_prefix }}
      MAX_REPO_GB: ${{ inputs.max_repo_gb }}
      VISIBILITY: ${{ inputs.visibility }}
      LFS_THRESHOLD_MB: ${{ inputs.lfs_threshold_mb }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependencias (git-lfs, p7zip, aria2, jq)
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y git-lfs p7zip-full aria2 jq

      - name: Configurar Git (autor)
        shell: bash
        run: |
          set -euxo pipefail
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions[bot]"

      - name: Descargar .tbi (con reintentos)
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p work
          cd work
          aria2c -x 16 -s 16 --continue=true --retry-wait=10 --max-tries=20 \
            -o image.tbi "$TBI_URL"
          ls -lh image.tbi

      - name: Extraer .tbi (intenta con 7z)
        shell: bash
        run: |
          set -euxo pipefail
          cd work
          mkdir -p extracted
          # 7z puede extraer algunas imágenes, pero no siempre para .tbi.
          # Si falla, abortamos con mensaje.
          if ! 7z x -y image.tbi -oextracted; then
            echo "::error::No se pudo extraer con 7z. Este .tbi suele ser de TeraByte (TBIView/TBIMount). Considera extraer en Windows o con herramientas TeraByte y subir el resultado ya extraído."
            exit 1
          fi
          echo "Extracción completada."
          du -sh extracted || true

      - name: Trocear archivos >1.9GB (para cumplir límites típicos LFS)
        shell: bash
        run: |
          set -euxo pipefail
          cd work/extracted
          # Troceamos cualquier archivo > 1900MB
          while IFS= read -r -d '' f; do
            echo "Splitting: $f"
            dir="$(dirname "$f")"
            base="$(basename "$f")"
            # genera base.part-000, base.part-001, ...
            split -b 1900M -d -a 3 --additional-suffix=.bin "$f" "$dir/$base.part-"
            rm -f "$f"
          done < <(find . -type f -size +1900M -print0)

      - name: Sharding por tamaño (bin-pack) → work/shards/partXX
        shell: bash
        run: |
          set -euxo pipefail
          python3 scripts/binpack.py \
            --src work/extracted \
            --dst work/shards \
            --max-gb "$MAX_REPO_GB"

      - name: Subir cada shard a repos separados (crea repos si no existen)
        shell: bash
        run: |
          set -euxo pipefail

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "::error::Falta secrets.GH_PAT"
            exit 1
          fi

          OWNER="$(jq -r .repository_owner < "$GITHUB_EVENT_PATH")"
          echo "Owner: $OWNER"

          # Requiere gh CLI (en self-hosted instálalo si no está). En hosted suele venir.
          if ! command -v gh >/dev/null 2>&1; then
            echo "::error::No está instalado gh CLI en el runner. Instálalo en tu self-hosted."
            exit 1
          fi

          export GH_TOKEN

          # Loop de shards
          i=1
          for part in work/shards/part*/; do
            part="${part%/}"
            repo="$(printf "%s-part%02d" "$REPO_PREFIX" "$i")"
            full="$OWNER/$repo"
            echo "=== Procesando $part -> $full ==="

            # Crear repo si no existe
            if ! gh repo view "$full" >/dev/null 2>&1; then
              echo "Creando repo $full..."
              if [[ "$VISIBILITY" == "public" ]]; then
                gh repo create "$full" --public --confirm
              else
                gh repo create "$full" --private --confirm
              fi
            else
              echo "Repo ya existe: $full"
            fi

            # Publicar contenido del shard
            tmp="$(mktemp -d)"
            rsync -a --delete "$part"/ "$tmp"/

            pushd "$tmp" >/dev/null
              git init -b main
              git lfs install --local

              # Track LFS para archivos > umbral (ej 50MB)
              threshold="${LFS_THRESHOLD_MB}M"
              while IFS= read -r -d '' big; do
                # track por ruta exacta
                git lfs track "${big#./}"
              done < <(find . -type f -size +"$threshold" -print0)

              git add .gitattributes || true
              git add -A

              # Commit si hay cambios
              if git diff --cached --quiet; then
                echo "Nada que commitear en $full."
              else
                git commit -m "Import shard $(basename "$part") (LFS > ${LFS_THRESHOLD_MB}MB)"
              fi

              # Push usando token
              git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${full}.git"
              git push -u origin main
            popd >/dev/null

            rm -rf "$tmp"
            i=$((i+1))
          done

      - name: Resumen
        shell: bash
        run: |
          set -euxo pipefail
          echo "Shards generados:"
          du -sh work/shards/part* || true
          echo "Listo."
          
