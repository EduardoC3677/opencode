name: TBI -> TBIMount (ko) -> mount -> extract -> manifest (ubuntu-latest)

on:
  workflow_dispatch:
    inputs:
      tbi_url:
        description: "URL del .tbi"
        required: true
        default: "https://archive.org/download/acer-aspire-xc-830-full-image/Acer%20Aspire%20XC-830%20Full%20Image.tbi"
      tbimount_zip_url:
        description: "URL del zip tbimount_linux.zip (tu release)"
        required: true
        default: "https://github.com/EduardoC3677/opencode/releases/download/1/tbimount_linux.zip"
      lfs_threshold_mb:
        description: "Umbral (MB) para marcar archivos grandes en manifest"
        required: true
        default: "50"
      force_insmod:
        description: "Intentar insmod -f si no coincide kernel (riesgoso)"
        required: true
        default: "false"
      do_push:
        description: "Subir contenido al repo (DESACTIVADO por defecto)"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest

    env:
      TBI_URL: ${{ inputs.tbi_url }}
      TBIMOUNT_ZIP_URL: ${{ inputs.tbimount_zip_url }}
      LFS_THRESHOLD_MB: ${{ inputs.lfs_threshold_mb }}
      FORCE_INSMOD: ${{ inputs.force_insmod }}
      DO_PUSH: ${{ inputs.do_push }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Espacio ANTES
        run: df -h

      # Limpieza del runner para liberar espacio (Marketplace). [1](https://www.yellowduck.be/posts/free-disk-space-ubuntu-github-marketplace)
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Espacio DESPUÉS
        run: df -h

      - name: Dependencias
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y aria2 curl unzip rsync util-linux ntfs-3g jq git-lfs python3

      - name: Descargar .tbi
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p work
          cd work
          aria2c -x 16 -s 16 --continue=true --retry-wait=10 --max-tries=20 \
            -o image.tbi "$TBI_URL"
          ls -lh image.tbi

      # === TBIMount corregido: descarga zip válido + extrae + elige .ko + insmod ===
      - name: Descargar TBIMount (zip válido) y seleccionar .ko
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p tools/tbimount
          cd tools/tbimount

          curl -fL --retry 10 --retry-delay 5 \
            -A "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/123 Safari/537.36" \
            -H "Accept: application/zip,application/octet-stream;q=0.9,*/*;q=0.8" \
            -o tbimount_linux.zip "$TBIMOUNT_ZIP_URL"

          echo "Descarga:"
          ls -lh tbimount_linux.zip
          file tbimount_linux.zip || true

          unzip -t tbimount_linux.zip >/dev/null
          rm -rf extracted
          unzip -q tbimount_linux.zip -d extracted
          cd extracted

          echo "Kernel actual:"
          uname -a
          KREL="$(uname -r)"
          KBASE="${KREL%%-*}"     # 6.17.0-1013-azure -> 6.17.0
          KMAJMIN="$(echo "$KBASE" | awk -F. '{print $1 "." $2}')"  # 6.17

          # Binario
          TBIMOUNT_BIN="$(find . -type f -iname tbimount | head -n 1)"
          chmod +x "$TBIMOUNT_BIN"
          echo "TBIMOUNT_BIN=$PWD/$TBIMOUNT_BIN" >> "$GITHUB_ENV"
          echo "TBIMOUNT_DIR=$PWD" >> "$GITHUB_ENV"

          # Elegir .ko:
          # 1) intento exacto por vermagic
          mapfile -t KOS < <(find . -type f -name tbimount.ko -print)
          BEST_KO=""
          for ko in "${KOS[@]}"; do
            if modinfo "$ko" >/dev/null 2>&1; then
              VM="$(modinfo -F vermagic "$ko" || true)"
              if [[ "${VM:-}" == *"$KREL"* ]]; then
                BEST_KO="$ko"
                break
              fi
            fi
          done

          # 2) si no hay match exacto, elige el "más cercano" por major.minor + amd64
          #    Ej: kernel 6.17.x -> usa 6.17.9-amd64-iflnet (patch más alto disponible)
          if [[ -z "$BEST_KO" ]]; then
            mapfile -t CANDS < <(find . -type f -path "./${KMAJMIN}.*-amd64-iflnet/tbimount.ko" -print | sort -V)
            if [[ "${#CANDS[@]}" -gt 0 ]]; then
              BEST_KO="${CANDS[-1]}"
              echo "KO ${KMAJMIN}.x (máximo) forzado elegido: $BEST_KO"
            fi
          fi

          if [[ -z "$BEST_KO" ]]; then
            echo "::error::No encontré un tbimount.ko usable para este kernel ($KREL)."
            echo "Disponibles:"
            printf '%s\n' "${KOS[@]}"
            exit 1
          fi

          echo "TBIMOUNT_KO=$PWD/$BEST_KO" >> "$GITHUB_ENV"

          echo "Ayuda tbimount (sin args):"
          "$PWD/$TBIMOUNT_BIN" || true

      - name: insmod tbimount.ko + tbimount mount + mount -o ro /dev/tbia + extraer
        shell: bash
        env:
          TBIMOUNT_DIR: ${{ env.TBIMOUNT_DIR }}
          TBIMOUNT_BIN: ${{ env.TBIMOUNT_BIN }}
          TBIMOUNT_KO: ${{ env.TBIMOUNT_KO }}
        run: |
          set -euxo pipefail

          mkdir -p work/mnt work/extracted

          echo "Kernel: $(uname -r)"
          echo "KO: $TBIMOUNT_KO"
          echo "FORCE_INSMOD=$FORCE_INSMOD"

          # 1) cargar módulo
          if sudo insmod "$TBIMOUNT_KO"; then
            echo "insmod OK"
          else
            echo "insmod falló."
            if [[ "$FORCE_INSMOD" == "true" ]]; then
              echo "Intentando insmod -f (forzado)..."
              sudo insmod -f "$TBIMOUNT_KO" || {
                echo "::error::insmod -f falló."
                dmesg | tail -n 200 || true
                exit 1
              }
            else
              echo "::error::No se pudo cargar el módulo. Pon force_insmod=true si quieres intentar forzar."
              dmesg | tail -n 200 || true
              exit 1
            fi
          fi

          lsmod | grep -i tbimount || true

          # 2) montar el .tbi con id=a para asegurar /dev/tbia
          #    Según tu output: tbimount mount filename [--id id] ... / unmount [device] 
          pushd "$TBIMOUNT_DIR" >/dev/null
            sudo "$TBIMOUNT_BIN" mount "$GITHUB_WORKSPACE/work/image.tbi" --id a
          popd >/dev/null

          # 3) esperar device
          for i in $(seq 1 20); do
            if [[ -b /dev/tbia ]]; then break; fi
            sleep 1
          done

          # Si no aparece, intenta crear nodos a partir del major (por si udev no lo creó)
          if [[ ! -b /dev/tbia ]]; then
            MAJOR="$(awk '/tbimount/{print $1}' /proc/devices | head -n1 || true)"
            if [[ -z "$MAJOR" ]]; then
              echo "::error::No existe /dev/tbia y no encuentro major tbimount en /proc/devices"
              dmesg | tail -n 200 || true
              exit 1
            fi
            for n in $(seq 0 9); do
              letter=$(printf "\\$(printf '%03o' $((97+n)))")
              dev="/dev/tbi${letter}"
              sudo mknod "$dev" b "$MAJOR" "$n" || true
              sudo chmod 666 "$dev" || true
            done
          fi

          # 4) montar read-only:
          #    - primero intenta /dev/tbia directo
          #    - si hay particiones tipo /dev/tbia1, prueba montarlas
          set +e
          sudo mount -o ro /dev/tbia work/mnt
          rc=$?
          set -e

          if [[ $rc -ne 0 ]]; then
            echo "No se pudo montar /dev/tbia directo. Intentando con particiones..."
            lsblk /dev/tbia || true
            sudo umount work/mnt >/dev/null 2>&1 || true

            mounted=0
            for p in /dev/tbia*; do
              [[ "$p" == "/dev/tbia" ]] && continue
              [[ ! -b "$p" ]] && continue
              echo "Probando mount ro: $p"
              if sudo mount -o ro "$p" work/mnt; then
                mounted=1
                break
              fi
            done
            if [[ $mounted -eq 0 ]]; then
              echo "::error::No pude montar /dev/tbia ni sus particiones."
              dmesg | tail -n 200 || true
              exit 1
            fi
          fi

          # 5) copiar
          rsync -aH --numeric-ids work/mnt/ work/extracted/

          # 6) limpiar
          sudo umount work/mnt || true
          pushd "$TBIMOUNT_DIR" >/dev/null
            sudo "$TBIMOUNT_BIN" unmount /dev/tbia -q || sudo "$TBIMOUNT_BIN" unmount -q || true
          popd >/dev/null
          sudo rmmod tbimount || true

          echo "Extracción OK:"
          du -sh work/extracted || true

      - name: Generar manifest (lista archivos + >${{ inputs.lfs_threshold_mb }}MB)
        shell: bash
        run: |
          set -euxo pipefail
          cd work/extracted
          # Inventario general
          find . -type f -printf '%s\t%p\n' | sort -nr > ../manifest_all.tsv
          # Archivos grandes
          THRESH="${LFS_THRESHOLD_MB}M"
          find . -type f -size +"$THRESH" -printf '%s\t%p\n' | sort -nr > ../manifest_over_${LFS_THRESHOLD_MB}MB.tsv
          echo "Manifests creados en work/:"
          ls -lh ../manifest_*.tsv

      - name: Subir manifests como artifact
        uses: actions/upload-artifact@v4
        with:
          name: manifests
          path: |
            work/manifest_all.tsv
            work/manifest_over_*MB.tsv

      # === OPCIONAL: push a repo (desactivado por defecto) ===
      # GitHub advierte >50MiB y bloquea >100MiB sin LFS. [2](https://linuxvox.com/blog/how-to-mount-an-nfs-share-in-linux/)
      # Si tienes autorización legal para alojar este contenido, cambia do_push=true y añade tu lógica aquí.
      - name: (Opcional) Push al repo actual (DESACTIVADO)
        if: ${{ inputs.do_push == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          echo "::warning::Este paso está deshabilitado por defecto. Asegúrate de tener derechos/licencia antes de subir contenidos OEM."
          # Ejemplo mínimo (NO recomendado para 22GB):
          # git lfs install
          # find work/extracted -type f -size +${LFS_THRESHOLD_MB}M -print0 | while IFS= read -r -d '' f; do
          #   git lfs track "${f#work/extracted/}"
          # done
          # git add .
          # git commit -m "Add extracted contents"
          # git push
