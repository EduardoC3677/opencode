name: Descargar TBI + montar con TBIMount (ubuntu-latest)

on:
  workflow_dispatch:
    inputs:
      tbi_url:
        description: "URL del .tbi"
        required: true
        default: "https://archive.org/download/acer-aspire-xc-830-full-image/Acer%20Aspire%20XC-830%20Full%20Image.tbi"

jobs:
  mount_and_extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mostrar espacio (ANTES)
        run: df -h

      # Limpieza de runner para ganar espacio extra (hasta ~31GB según autor/opciones).
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
        # Acción del Marketplace para liberar espacio en ubuntu-latest. 

      - name: Mostrar espacio (DESPUÉS)
        run: df -h

      - name: Dependencias (aria2, unzip, rsync, ntfs-3g, util-linux)
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y aria2 unzip rsync ntfs-3g util-linux

      - name: Descargar .tbi (22GB)
        run: |
          set -euxo pipefail
          mkdir -p work
          cd work
          aria2c -x 16 -s 16 --continue=true --retry-wait=10 --max-tries=20 \
            -o image.tbi "${{ inputs.tbi_url }}"
          ls -lh image.tbi

      - name: Descargar TBIMount Linux
        run: |
          set -euxo pipefail
          mkdir -p tools/tbimount
          cd tools/tbimount

          # URL proporcionado por ti
          curl -L --retry 10 --retry-delay 5 -o tbimount_linux.zip \
            "https://www.terabyteunlimited.com/downloads/tbimount_linux.zip"

          unzip -q tbimount_linux.zip -d .
          echo "Contenido extraído:"
          find . -maxdepth 2 -type f -print

          # Localiza el binario ejecutable (suele llamarse tbimount o similar)
          TBIMOUNT_BIN="$(find . -maxdepth 2 -type f -iname 'tbimount*' -print | head -n 1)"
          if [[ -z "$TBIMOUNT_BIN" ]]; then
            echo "::error::No se encontró binario tbimount dentro del zip."
            exit 1
          fi

          chmod +x "$TBIMOUNT_BIN" || true
          echo "TBIMOUNT_BIN=$PWD/$TBIMOUNT_BIN" >> "$GITHUB_ENV"

          echo "Mostrando ayuda (si existe):"
          "$PWD/$TBIMOUNT_BIN" --help || "$PWD/$TBIMOUNT_BIN" -h || true

      - name: Montar TBI con TBIMount y extraer a work/extracted
        env:
          TBIMOUNT_BIN: ${{ env.TBIMOUNT_BIN }}
        run: |
          set -euxo pipefail
          cd work
          mkdir -p mnt extracted

          echo "TBIMOUNT_BIN=$TBIMOUNT_BIN"
          ls -lh image.tbi

          # Snapshot de discos visibles ANTES (por si TBIMount crea un dispositivo)
          BEFORE_DISKS="$(lsblk -ndo NAME,TYPE | awk '$2=="disk"{print $1}' | sort | tr '\n' ' ')"
          echo "Discos antes: $BEFORE_DISKS"

          mounted=0

          # Intentos comunes de CLI (se ajusta automáticamente según qué funcione)
          # Nota: el uso exacto depende de la versión; por eso probamos varias formas.
          for cmd in \
            "sudo \"$TBIMOUNT_BIN\" image.tbi mnt" \
            "sudo \"$TBIMOUNT_BIN\" -m mnt image.tbi" \
            "sudo \"$TBIMOUNT_BIN\" --mountpoint mnt image.tbi" \
            "sudo \"$TBIMOUNT_BIN\" --mount image.tbi --target mnt" \
            "sudo \"$TBIMOUNT_BIN\" image.tbi --mount mnt"
          do
            echo "Probando: $cmd"
            if bash -lc "$cmd"; then
              mounted=1
              break
            fi
          done

          # Caso A: TBIMount montó directamente en el directorio mnt (FUSE o similar)
          if [[ -n "$(ls -A mnt 2>/dev/null || true)" ]]; then
            echo "TBIMount montó en ./mnt. Copiando..."
            rsync -aH --numeric-ids mnt/ extracted/
            echo "Extracción lista en work/extracted"
            exit 0
          fi

          # Caso B: TBIMount creó un dispositivo de bloque; detectarlo comparando lsblk
          AFTER_DISKS="$(lsblk -ndo NAME,TYPE | awk '$2=="disk"{print $1}' | sort | tr '\n' ' ')"
          echo "Discos después: $AFTER_DISKS"

          NEW_DISK="$(comm -13 <(printf "%s\n" $BEFORE_DISKS | sort) <(printf "%s\n" $AFTER_DISKS | sort) | head -n 1 || true)"
          if [[ -z "$NEW_DISK" ]]; then
            echo "::error::TBIMount no montó en ./mnt y tampoco apareció un disco nuevo en lsblk."
            echo "::error::Revisa el output de '--help' en el paso anterior y ajusta los parámetros del comando TBIMount."
            exit 1
          fi

          echo "Nuevo dispositivo detectado: /dev/$NEW_DISK"
          sudo partprobe "/dev/$NEW_DISK" || true
          lsblk "/dev/$NEW_DISK"

          # Obtén particiones (si existen)
          mapfile -t PARTS < <(lsblk -rno NAME,TYPE "/dev/$NEW_DISK" | awk '$2=="part"{print $1}')
          if [[ "${#PARTS[@]}" -eq 0 ]]; then
            # Si no hay particiones, tratamos el disco como una sola FS
            PARTS=("$NEW_DISK")
          fi

          idx=0
          for p in "${PARTS[@]}"; do
            mp="mnt/p$idx"
            sudo mkdir -p "$mp"

            echo "Montando /dev/$p en $mp (solo lectura)..."
            # Intento genérico ro; si es NTFS, intentamos también con ntfs-3g/ntfs3 implícitamente.
            if sudo mount -o ro "/dev/$p" "$mp"; then
              :
            else
              # fallback (si el automount falla por tipo)
              sudo mount -t ntfs -o ro "/dev/$p" "$mp" || sudo mount -t ntfs3 -o ro "/dev/$p" "$mp" || true
            fi

            if mountpoint -q "$mp"; then
              echo "Copiando contenido de $mp a extracted/ ..."
              rsync -aH --numeric-ids "$mp"/ extracted/
              sudo umount "$mp"
            else
              echo "No se pudo montar /dev/$p; se omite."
            fi

            idx=$((idx+1))
          done

          echo "Extracción lista en work/extracted"
          du -sh extracted || true
          
