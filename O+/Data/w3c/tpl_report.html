<!doctype html>
<html>
<head>
    <META HTTP-EQUIV="Pragma" CONTENT="no-cache">
    <META HTTP-EQUIV="Cache-Control" CONTENT="no-cache">
    <META HTTP-EQUIV="Expires" CONTENT="0">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <title>设备检测报告</title>
    <style>
        /* @page {
        size: A5;
    } */

        body {
            margin: 0;
            padding: 0;
        }

        .container {
            width: 100%;
            padding: 0px 15px;
            box-sizing: border-box;
            font-size: 12px;
            margin: 0px;
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .col-sm-6 {
            width: 50%;
            box-sizing: border-box;
            padding-right: 10px;
            padding-left: 0px;
        }

        .col-sm-4 {
            font-weight: 400;
            padding-left: 0px;
        }
        .table {
            width: 100%;
            /* font-size: 10px; */
        }
        .col-sm-8 {
            /* font-size: 5px; */
            font-weight: 400;
        }

        /* .col-sm-2 {
            width: 60px;
            height: 60px;
        } */

        label {
            /* font-size: 5px; */
        }

        .table>tbody>tr>th,
        .table>tbody>tr>td {
            border: 0px;
            padding:8px 16px 8px 0px;
        }

        .row {
            margin-right: 0px;
            margin-left: 0px;
        }

        #reportBodyId {
            width: 574px;

            margin: 0 auto;
        }

        @media print {
            #footer {
                color: #000000;
                opacity: 0.55;
                position: fixed;
                bottom: 0;
            }
        }
        #footer,
        .page-footer-space {
            height: 50px;

        }

        #footer {
            bottom: 0;
            /* width: 100%; */
            width: 574px;
            height: 50px;
            padding: 0px 15px;
        }
    </style>
</head>
<body id="reportBodyId" style="background-color:#ECEEF1;">
    <table style="width:100%">
        <tbody>
            <tr>
                <td>
                    <div class="container" style="background-color:#FFFFFF;">
                        %1
                        %2
                    </div>
                </td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>
                    <div style="background-color:#FFFFFF;" class="page-footer-space"></div>
                </td>
            </tr>
        </tfoot>
    </table>
    <span style="font-size:10px;">%3</span>
  <script>
    window.print();
  </script>
</body>
</html>
